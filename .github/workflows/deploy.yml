name: CI / Deploy to GitHub Pages

# Se déclenche à chaque push sur main, et manuellement depuis l'onglet Actions
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions nécessaires au déploiement GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on ne coupe pas un déploiement en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 1) Porte qualité : lint + build. Si ça échoue, on ne déploie pas.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # 2) Déploiement : ne tourne que si le job build a réussi
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
