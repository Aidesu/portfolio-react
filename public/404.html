<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Deafiaa</title>
        <script type="text/javascript">
            // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
            // GitHub Pages serves this file for any unknown path (e.g. a hard reload
            // of /about or /project/5). We redirect to the site root, stashing the
            // requested route in the query string so index.html can restore it and
            // hand it to React Router. Custom domain at the root → keep 0 segments.
            var pathSegmentsToKeep = 0;
            var l = window.location;
            l.replace(
                l.protocol +
                    "//" +
                    l.hostname +
                    (l.port ? ":" + l.port : "") +
                    l.pathname
                        .split("/")
                        .slice(0, 1 + pathSegmentsToKeep)
                        .join("/") +
                    "/?/" +
                    l.pathname
                        .slice(1)
                        .split("/")
                        .slice(pathSegmentsToKeep)
                        .join("/")
                        .replace(/&/g, "~and~") +
                    (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
                    l.hash,
            );
        </script>
    </head>
    <body></body>
</html>
