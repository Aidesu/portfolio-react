<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <script type="text/javascript">
            // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
            // Restores the real path stashed by 404.html (/?/about → /about) before
            // React Router reads the URL, so deep-link reloads land on the right page.
            (function (l) {
                if (l.search[1] === "/") {
                    var decoded = l.search
                        .slice(1)
                        .split("&")
                        .map(function (s) {
                            return s.replace(/~and~/g, "&");
                        })
                        .join("?");
                    window.history.replaceState(
                        null,
                        null,
                        l.pathname.slice(0, -1) + decoded + l.hash,
                    );
                }
            })(window.location);
        </script>
        <link rel="icon" type="image/jpg" href="/pfpCarla.jpg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Carla Deafiaa</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=JetBrains+Mono:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
